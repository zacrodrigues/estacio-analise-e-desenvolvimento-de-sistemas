<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Praticando Javascript - Exercício 1</title>
  </head>
  <body></body>
  <script type="text/javascript">
    const dividir = ({ n1, n2 }) => {
      return n1 / n2;
    };

    const n1 = prompt("Insira um número: ");
    const n2 = prompt("Insira outro número: ");
    const resultado = dividir({ n1, n2 });

    alert(`O resultado da divisão é igual a: ${resultado}`);
  </script>
</html>
